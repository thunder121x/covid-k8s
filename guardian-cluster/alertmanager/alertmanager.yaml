global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity", "namespace"]
  group_wait:     30s   # batch alerts before first notification
  group_interval: 5m    # wait before adding new alerts to an existing group
  repeat_interval: 12h  # default repeat; overridden per route below
  receiver: discord-default

  routes:
    - matchers:
        - severity = critical
      receiver: discord-critical
      repeat_interval: 15m
      continue: false

    - matchers:
        - severity = warning
      receiver: discord-warning
      repeat_interval: 1h
      continue: false

receivers:
  - name: discord-default
    slack_configs:
      - api_url: "${DISCORD_WEBHOOK_URL}/slack"
        channel: "#guardian-alerts"
        username: "Guardian Bot"
        icon_emoji: ":shield:"
        title: 'Guardian: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Pod:* {{ .Labels.pod | default "N/A" }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: discord-critical
    slack_configs:
      - api_url: "${DISCORD_WEBHOOK_URL}/slack"
        channel: "#guardian-alerts"
        username: "Guardian Bot"
        icon_emoji: ":red_circle:"
        color: "#FF0000"
        title: ':red_circle: CRITICAL — {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Pod:* {{ .Labels.pod | default "N/A" }}
          *Namespace:* {{ .Labels.namespace }}
          *Severity:* CRITICAL
          *Summary:* {{ .Annotations.summary }}
          *Detail:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

  - name: discord-warning
    slack_configs:
      - api_url: "${DISCORD_WEBHOOK_URL}/slack"
        channel: "#guardian-alerts"
        username: "Guardian Bot"
        icon_emoji: ":warning:"
        color: "#FFA500"
        title: ':warning: WARNING — {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Pod:* {{ .Labels.pod | default "N/A" }}
          *Namespace:* {{ .Labels.namespace }}
          *Summary:* {{ .Annotations.summary }}
          {{ end }}
        send_resolved: true

# Suppress warning noise while a critical is already firing for the same alert
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal:
      - alertname
      - namespace
