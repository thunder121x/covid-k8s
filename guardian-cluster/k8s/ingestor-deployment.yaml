apiVersion: apps/v1
kind: Deployment
metadata:
  name: aqi-ingestor
  namespace: guardian
  labels:
    app: aqi-ingestor
    component: ingestor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aqi-ingestor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: aqi-ingestor
        component: ingestor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8000"
    spec:
      containers:
        - name: ingestor
          image: guardian/aqi-ingestor:latest
          # Never pull from registry — use image built inside minikube's Docker daemon
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: guardian-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: guardian-secrets
                  key: db-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: aqi-ingestor
  namespace: guardian
  labels:
    app: aqi-ingestor
spec:
  selector:
    app: aqi-ingestor
  ports:
    - port: 80
      targetPort: 8000
      name: http
