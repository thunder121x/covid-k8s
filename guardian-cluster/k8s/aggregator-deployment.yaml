apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-aggregator
  namespace: guardian
  labels:
    app: data-aggregator
    component: aggregator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-aggregator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: data-aggregator
        component: aggregator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8002"
    spec:
      containers:
        - name: aggregator
          image: guardian/data-aggregator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: guardian-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: guardian-secrets
                  key: db-password
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          # No /ready endpoint — aggregator is always ready if alive
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: data-aggregator
  namespace: guardian
  labels:
    app: data-aggregator
spec:
  selector:
    app: data-aggregator
  ports:
    - port: 80
      targetPort: 8002
      name: http
